name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

  # To enable automatic deployment to prod on main merge, uncomment:
  # push:
  #   branches: [main]

env:
  REGION: europe-west3  # adjust if different

jobs:
  deploy:
    name: Deploy (${{ inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.PROJECT }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/op-tcg:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Resolve Cloud Run config
        id: config
        run: |
          if [ "${{ inputs.environment }}" = "dev" ]; then
            echo "min_instances=0" >> $GITHUB_OUTPUT
          else
            echo "min_instances=1" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          image: ${{ steps.build.outputs.image }}
          region: ${{ env.REGION }}
          project_id: ${{ secrets.PROJECT }}
          flags: >-
            --memory=1Gi
            --min-instances=${{ steps.config.outputs.min_instances }}
          env_vars: |
            CANONICAL_HOST=${{ vars.CANONICAL_HOST }}
            GOOGLE_CLOUD_PROJECT=${{ secrets.PROJECT }}
            GOOGLE_FORM_FEEDBACK_URL=${{ secrets.GOOGLE_FORM_FEEDBACK_URL }}
            SESSION_MIDDLEWARE_SECRET_KEY=${{ secrets.SESSION_MIDDLEWARE_SECRET_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
            DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }}

      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ vars.CLOUD_RUN_SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.PROJECT }} \
            --format 'value(status.url)'