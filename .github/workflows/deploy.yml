name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

  push:
    branches: [main]

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-reusable.yml
    with:
      environment: ${{ inputs.environment || 'production' }}
      ref: ${{ github.ref }}
      sha: ${{ github.sha }}
      min_instances: ${{ inputs.environment == 'dev' && 0 || 1 }}
    secrets: inherit