name: Deploy PR to Dev

on:
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  prepare:
    name: Prepare PR deployment
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request != null && github.event.comment.body == '/deploy dev')
    permissions:
      pull-requests: write
      issues: write
    outputs:
      branch: ${{ steps.pr.outputs.branch }}
      sha: ${{ steps.pr.outputs.sha }}
      pr_number: ${{ steps.pr.outputs.pr_number }}

    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR branch and SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'pull_request') {
              core.setOutput('branch', context.payload.pull_request.head.ref);
              core.setOutput('sha', context.payload.pull_request.head.sha);
              core.setOutput('pr_number', context.payload.pull_request.number);
            } else {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              core.setOutput('branch', pr.data.head.ref);
              core.setOutput('sha', pr.data.head.sha);
              core.setOutput('pr_number', context.issue.number);
            }

  deploy:
    needs: prepare
    uses: ./.github/workflows/_deploy-reusable.yml
    with:
      environment: dev
      ref: ${{ needs.prepare.outputs.branch }}
      sha: ${{ needs.prepare.outputs.sha }}
      min_instances: 0
    secrets: inherit

  comment:
    name: Post deployment result
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: always() && needs.prepare.result == 'success'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.deploy.result }}' === 'success';
            const body = success
              ? `✅ Deployed to dev: ${{ needs.deploy.outputs.url }}`
              : `❌ Deployment failed. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.prepare.outputs.pr_number }},
              body,
            });