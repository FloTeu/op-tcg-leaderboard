name: Deploy PR to Dev

on:
  issue_comment:
    types: [created]

jobs:
  prepare:
    name: Prepare PR deployment
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/deploy dev'
    permissions:
      pull-requests: write
      issues: write
    outputs:
      branch: ${{ steps.pr.outputs.branch }}
      sha: ${{ steps.pr.outputs.sha }}

    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR branch and SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

  deploy:
    needs: prepare
    uses: ./.github/workflows/_deploy-reusable.yml
    with:
      environment: dev
      ref: ${{ needs.prepare.outputs.branch }}
      sha: ${{ needs.prepare.outputs.sha }}
      min_instances: 0
    secrets: inherit

  comment:
    name: Post deployment result
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: always() && needs.prepare.result == 'success'
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.deploy.result }}' === 'success';
            const body = success
              ? `✅ Deployed to dev: ${{ needs.deploy.outputs.url }}`
              : `❌ Deployment failed. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body,
            });