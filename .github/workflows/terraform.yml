name: 'Terraform'

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - dev

permissions:
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/_terraform-reusable.yml
    with:
      environment: ${{ inputs.environment || 'production' }}
    secrets: inherit
